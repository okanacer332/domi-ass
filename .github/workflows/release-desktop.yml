name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            build_command: npm run dist -- --win nsis --x64 --publish always
          - name: macOS Intel
            os: macos-13
            build_command: npm run dist -- --mac dmg zip --x64 --publish always
          - name: macOS Apple Silicon
            os: macos-14
            build_command: npm run dist -- --mac dmg zip --arm64 --publish always

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish desktop artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ matrix.build_command }}
